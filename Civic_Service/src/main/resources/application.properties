spring.application.name=Civic_Service
server.port=2020
spring.datasource.url=jdbc:mysql://localhost:3306/Civics
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD_HERE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
twilio.account-sid=dummy_sid
twilio.auth-token=dummy_token
twilio.phone-number=+1234567890
# LangChain4j Ollama Settings
# LangChain4j Ollama Settings
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=phi3
# Give the model 2 minutes to wake up instead of 60 seconds
langchain4j.ollama.chat-model.timeout=120s
# FORCE the model to only output JSON data
langchain4j.ollama.chat-model.format=json